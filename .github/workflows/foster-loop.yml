name: Foster Improvement Loop

on:
  schedule:
    # Runs nightly at 2am UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      model:
        description: 'Claude model to use'
        required: false
        default: 'claude-sonnet-4-6'
        type: choice
        options:
          - claude-sonnet-4-6
          - claude-opus-4-7

jobs:
  improve:
    name: Autonomous improvement iteration
    runs-on: arc-runner-set-k8s-foster
    container: harbor.home.local/library/foster-runner:latest
    timeout-minutes: 90

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run improvement loop
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ inputs.model || 'claude-sonnet-4-6' }}
        run: |
          claude \
            --model "$CLAUDE_MODEL" \
            --dangerously-skip-permissions \
            -p "$(cat .github/prompts/improvement-loop.md)"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet && git diff --staged --quiet \
            && echo "has_changes=false" >> "$GITHUB_OUTPUT" \
            || echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Open pull request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: claude/loop-${{ github.run_number }}
          commit-message: |
            feat: autonomous improvement iteration #${{ github.run_number }}

            Generated by Foster Improvement Loop workflow.
          title: 'Claude Code: improvement iteration #${{ github.run_number }}'
          body: |
            ## Autonomous improvement iteration

            This PR was generated by the Foster Improvement Loop workflow running Claude Code autonomously.

            **Model:** `${{ inputs.model || 'claude-sonnet-4-6' }}`
            **Run:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            ### Review checklist
            - [ ] Tests pass (Rust + Playwright)
            - [ ] No regressions in existing behaviour
            - [ ] `CLAUDE.md` reflects any architectural changes
            - [ ] Changes align with Foster's design philosophy (see `CLAUDE.md`)

            ---
            *Merge only after human review. If this looks wrong, close and adjust the prompt at `.github/prompts/improvement-loop.md`.*
          draft: false
