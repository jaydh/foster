<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foster · Aura</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── CSS custom properties — one source of truth for each state ── */
    :root {
      --color-bg:       #0a0a0f;
      --color-orb:      #334;
      --color-ring:     rgba(80, 80, 120, 0.12);
      --color-glow:     rgba(80, 80, 200, 0.0);
      --color-label:    #556;
      --color-desc:     #445;
      --pulse-speed:    4s;
      --ring-scale:     1;
      --orb-scale:      1;
    }

    /* calm — slow blue breath */
    [data-fx-state="calm"] {
      --color-bg:     #090910;
      --color-orb:    #1a2a4a;
      --color-ring:   rgba(50, 80, 160, 0.10);
      --color-glow:   rgba(60, 100, 240, 0.15);
      --color-label:  #3a5a8a;
      --color-desc:   #2a4060;
      --pulse-speed:  5s;
    }

    /* focused — cool teal, tight */
    [data-fx-state="focused"] {
      --color-bg:     #070f0f;
      --color-orb:    #0f3a38;
      --color-ring:   rgba(20, 150, 140, 0.13);
      --color-glow:   rgba(20, 200, 180, 0.20);
      --color-label:  #1a8a80;
      --color-desc:   #136058;
      --pulse-speed:  2.8s;
    }

    /* energized — warm amber/gold */
    [data-fx-state="energized"] {
      --color-bg:     #0f0d07;
      --color-orb:    #3a2a08;
      --color-ring:   rgba(200, 150, 20, 0.14);
      --color-glow:   rgba(240, 180, 30, 0.25);
      --color-label:  #c08820;
      --color-desc:   #906010;
      --pulse-speed:  1.8s;
    }

    /* overwhelmed — red/magenta, fast */
    [data-fx-state="overwhelmed"] {
      --color-bg:     #0f070a;
      --color-orb:    #3a0f1a;
      --color-ring:   rgba(200, 40, 80, 0.15);
      --color-glow:   rgba(240, 50, 100, 0.28);
      --color-label:  #c03060;
      --color-desc:   #802040;
      --pulse-speed:  1.1s;
    }

    /* ── layout ── */
    html, body { height: 100%; }
    body {
      font-family: "Berkeley Mono", "Fira Code", ui-monospace, monospace;
      background: var(--color-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      transition:
        background 1.2s ease;
      overflow: hidden;
    }

    /* ── orb + rings ── */
    .orb-wrap {
      position: relative;
      width: 220px;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 3rem;
    }

    /* Expanding ring layers — pure CSS animation driven by custom property */
    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid var(--color-ring);
      animation: expand-ring var(--pulse-speed) ease-out infinite;
      transition: border-color 1.2s ease, animation-duration 0.8s ease;
      pointer-events: none;
    }
    .ring:nth-child(1) { width: 100%; height: 100%; animation-delay: 0s; }
    .ring:nth-child(2) { width: 100%; height: 100%; animation-delay: calc(var(--pulse-speed) / 3); }
    .ring:nth-child(3) { width: 100%; height: 100%; animation-delay: calc(var(--pulse-speed) / 3 * 2); }

    @keyframes expand-ring {
      0%   { transform: scale(1);   opacity: 0.8; }
      100% { transform: scale(2.6); opacity: 0;   }
    }

    /* Central orb */
    .orb {
      position: relative;
      z-index: 2;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 36%, var(--color-orb), #000 72%);
      box-shadow:
        0 0 40px 6px  var(--color-glow),
        0 0 80px 12px var(--color-glow),
        inset 0 0 20px rgba(255,255,255,0.04);
      animation: breathe var(--pulse-speed) ease-in-out infinite;
      transition:
        background 1.2s ease,
        box-shadow  1.2s ease;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1);    }
      50%       { transform: scale(1.08); }
    }

    /* ── text ── */
    .state-name {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      color: var(--color-label);
      transition: color 1.0s ease, opacity 0.4s ease;
      margin-bottom: 0.6rem;
      text-align: center;
    }

    .description {
      font-size: 0.8rem;
      color: var(--color-desc);
      letter-spacing: 0.08em;
      transition: color 1.0s ease, opacity 0.5s ease;
      text-align: center;
      height: 1.4em; /* reserve height so layout doesn't jump */
    }

    /* ── controls ── */
    .controls {
      display: flex;
      gap: 0.75rem;
      margin-top: 3rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      background: transparent;
      border: 1px solid #1c1c2a;
      color: #333;
      padding: 6px 20px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 2px;
      transition: border-color 0.4s ease, color 0.4s ease, background 0.4s ease;
    }
    .btn:hover { border-color: var(--color-label); color: var(--color-label); }

    /* Active-state highlight — driven by fx-class */
    .btn.is-active {
      border-color: var(--color-label);
      color: var(--color-label);
      background: rgba(255,255,255,0.03);
    }

    /* ── debug ── */
    details { margin-top: 3rem; width: 320px; }
    summary { font-size: 0.62rem; color: #222; cursor: pointer;
              text-transform: uppercase; letter-spacing: 0.1em; }
    pre { background: #060606; border: 1px solid #111; padding: 0.6rem;
          font-size: 0.62rem; color: #333; overflow: auto;
          margin-top: 0.4rem; max-height: 200px; }
  </style>
</head>
<body>

<!--
  Aura — an ambient state visualizer.

  CSS custom properties on [data-fx-state] drive every visual aspect:
    --color-bg, --color-orb, --color-glow, --pulse-speed …

  New fx-* attribute used here:
    fx-class="calm:is-active"   — adds `is-active` class when state == "calm"

  No JS animation code. Everything is @keyframes + CSS transitions.
-->
<div fx-machine="aura">

  <!-- orb with three expanding ring layers -->
  <div class="orb-wrap">
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
    <div class="orb"></div>
  </div>

  <div class="state-name" fx-state-label>…</div>
  <div class="description" fx-text="description"></div>

  <div class="controls">
    <button class="btn" fx-class="calm:is-active"       fx-on="click->calm">Calm</button>
    <button class="btn" fx-class="focused:is-active"    fx-on="click->focus">Focus</button>
    <button class="btn" fx-class="energized:is-active"  fx-on="click->energize">Energize</button>
    <button class="btn" fx-class="overwhelmed:is-active" fx-on="click->overwhelm">Overwhelm</button>
  </div>

</div><!-- /fx-machine -->

<details>
  <summary>snapshot</summary>
  <pre id="debug-snapshot">{}</pre>
</details>

<script type="module">
  import init from '/pkg/foster_client.js';
  init();
</script>
</body>
</html>
