<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foster • Counter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Berkeley Mono", "Fira Code", monospace;
      background: #0d0d0d;
      color: #d0d0d0;
      max-width: 640px;
      margin: 3rem auto;
      padding: 0 1.5rem;
    }
    h1 { font-size: 0.75rem; color: #555; text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 2rem; }

    /* All fx-show elements start hidden; the WASM runtime reveals them. */
    [fx-show] { display: none; }

    .badge {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 2px;
      font-size: 0.7rem;
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      color: #7a7a7a;
    }

    .count-display {
      font-size: 5rem;
      font-weight: 700;
      color: #fff;
      line-height: 1;
      margin: 1.5rem 0 1rem;
      letter-spacing: -0.02em;
    }

    .controls { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; margin-bottom: 1.5rem; }
    button {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #d0d0d0;
      padding: 6px 18px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
      transition: background 0.1s;
    }
    button:hover:not([disabled]) { background: #222; border-color: #444; }
    button[disabled] { opacity: 0.35; cursor: not-allowed; }
    .btn-danger { color: #e07070; border-color: #4a2020; }
    .btn-danger:hover:not([disabled]) { background: #1c1010; }
    .btn-safe { color: #70c070; border-color: #204a20; }
    .btn-safe:hover:not([disabled]) { background: #101c10; }

    .error-box {
      border: 1px solid #5a2020;
      background: #120808;
      padding: 1.2rem 1.5rem;
      border-radius: 2px;
    }
    .error-box p { color: #d07070; margin-bottom: 1rem; font-size: 0.9rem; }
    .error-count { color: #888; }

    hr { border: none; border-top: 1px solid #1c1c1c; margin: 2rem 0; }

    details { margin-top: 0; }
    summary { font-size: 0.72rem; color: #444; cursor: pointer; text-transform: uppercase; letter-spacing: 0.1em; }
    summary:hover { color: #666; }
    pre {
      margin-top: 0.75rem;
      background: #111;
      border: 1px solid #1c1c1c;
      padding: 1rem;
      font-size: 0.75rem;
      color: #888;
      overflow: auto;
      line-height: 1.6;
    }

    .meta { font-size: 0.75rem; color: #444; margin-bottom: 0.5rem; }
  </style>
</head>
<body>

  <h1>Foster UI · Counter</h1>

  <!--
    fx-machine="counter"
      Marks this element as a machine root.  The WASM runtime reads this
      attribute on load, fetches the initial snapshot, and applies it.
      `data-fx-state` and `data-fx-version` are stamped here after each
      transition — Playwright assertions can target them directly.

    Playwright example:
      const root = page.locator('[fx-machine="counter"]');
      await expect(root).toHaveAttribute('data-fx-state', 'idle');
  -->
  <div fx-machine="counter">

    <p class="meta">state: <span class="badge" fx-state-label>…</span></p>

    <!-- ── idle state ─────────────────────────────────────────────────── -->
    <!--
      fx-show="idle"
        This div is visible only when the machine is in the "idle" state.
        Multiple states: fx-show="idle,loading"
    -->
    <div fx-show="idle">
      <!--
        fx-text="count"
          Sets text content from context["count"].
          The placeholder "0" is shown before WASM loads.
      -->
      <div class="count-display"><span fx-text="count">0</span></div>

      <div class="controls">
        <!--
          fx-on="click->decrement"
            On click, POST /transition with {event: "decrement"}.
            Format: <dom-event>-><machine-event>
        -->
        <button fx-on="click->decrement">−</button>
        <button fx-on="click->increment">+</button>
        <button fx-on="click->reset">reset</button>
        <!--
          break_it transitions to "error" state to demonstrate multi-state machines.
          In a real app this might be a network failure or validation error.
        -->
        <button fx-on="click->break_it" class="btn-danger">break</button>
      </div>
    </div>

    <!-- ── error state ────────────────────────────────────────────────── -->
    <div fx-show="error" class="error-box">
      <p>Machine entered error state. Count was: <span class="error-count" fx-text="count">—</span></p>
      <button fx-on="click->recover" class="btn-safe">recover</button>
    </div>

  </div><!-- /fx-machine -->

  <hr>

  <!--
    Test injection — try it from the terminal while the server is running:

      # Force the machine into error state with count=99
      curl -X POST http://localhost:3000/test/state \
           -H 'Content-Type: application/json' \
           -d '{"machine_id":"counter","state":"error","context":{"count":99},"version":50}'

      # Assert the DOM reflects it (Playwright):
      await page.request.post('/test/state', {
        data: { machine_id: 'counter', state: 'error', context: { count: 99 }, version: 50 }
      });
      await expect(root).toHaveAttribute('data-fx-state', 'error');
  -->
  <details>
    <summary>snapshot</summary>
    <pre id="debug-snapshot">{}</pre>
  </details>

  <script type="module">
    import init from '/pkg/foster_client.js';
    init();
  </script>

</body>
</html>
